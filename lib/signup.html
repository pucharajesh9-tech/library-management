<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <div class="container">
      <h2>Signup</h2>
      <form id="signupForm">
        <input
          type="text"
          id="name"
          placeholder="Full Name"
          required
        /><br /><br />
        <input
          type="email"
          id="email"
          placeholder="Email"
          required
        /><br /><br />
        <input
          type="password"
          id="password"
          placeholder="Password"
          required
        /><br /><br />
        <input
          type="password"
          id="confirm"
          placeholder="Confirm Password"
          required
        /><br /><br />
        <button type="submit">Register</button>
      </form>
    </div>
  </body>
</html>
