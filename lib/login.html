<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <div class="container">
      <h2>Login</h2>
      <form id="loginForm">
        <input
          type="email"
          id="loginEmail"
          placeholder="Email"
          required
        /><br /><br />
        <input
          type="password"
          id="loginPassword"
          placeholder="Password"
          required
        /><br /><br />
        <button type="submit">Login</button>
      </form>
    </div>
  </body>
</html>
